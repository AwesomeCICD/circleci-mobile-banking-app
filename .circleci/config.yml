version: 2.1

# Demo pipeline — mirrors the Chunk Sidecar gates 1:1 so that "sidecar green"
# reliably means "CI green". Gate order matches .chunk/config.json:
# install → lint → scan (Trivy + Snyk) → test → bundle, for each mini-app.
#
# The scan steps need SNYK_TOKEN, provided via the AwesomeCICD `derry-snyk` context.
# Snyk reads SNYK_TOKEN from the environment, so no `snyk auth` step is required.
#
# A fuller iOS pipeline (OIDC, Fastlane, TestFlight, App Store) lives on
# AwesomeCICD/circleci-demo-ios:bcp-demo for reference.

jobs:
  validate-miniapp:
    parameters:
      miniapp_name:
        type: string
      miniapp_path:
        type: string
    docker:
      - image: cimg/node:20.18
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-<< parameters.miniapp_name >>-{{ checksum "<< parameters.miniapp_path >>/package-lock.json" }}
      - run:
          name: Install dependencies
          command: cd << parameters.miniapp_path >> && npm ci
      - save_cache:
          key: v1-deps-<< parameters.miniapp_name >>-{{ checksum "<< parameters.miniapp_path >>/package-lock.json" }}
          paths:
            - << parameters.miniapp_path >>/node_modules
      - run:
          name: Lint
          command: cd << parameters.miniapp_path >> && npm run lint
      - run:
          name: Install scanners (Trivy + Snyk)
          command: |
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
            sudo npm install -g snyk
      - restore_cache:
          keys:
            - v1-trivy-db-
      - run:
          name: "Scan: Trivy (HIGH,CRITICAL)"
          command: cd << parameters.miniapp_path >> && trivy fs --severity HIGH,CRITICAL --exit-code 1 --no-progress .
      - save_cache:
          key: v1-trivy-db-{{ epoch }}
          paths:
            - ~/.cache/trivy
      - run:
          name: "Scan: Snyk (severity high+)"
          command: cd << parameters.miniapp_path >> && snyk test --severity-threshold=high
      - run:
          name: Test
          command: cd << parameters.miniapp_path >> && npm test -- --watchAll=false
      - run:
          name: Bundle iOS
          command: cd << parameters.miniapp_path >> && mkdir -p dist/ios/assets && npm run bundle:ios

workflows:
  mobile-banking-pipeline:
    jobs:
      - validate-miniapp:
          name: "Payments"
          context: derry-snyk
          miniapp_name: payments
          miniapp_path: miniapps/payments
      - validate-miniapp:
          name: "Transfers"
          context: derry-snyk
          miniapp_name: transfers
          miniapp_path: miniapps/transfers
