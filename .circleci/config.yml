version: 2.1

orbs:
  aws-s3: circleci/aws-s3@4.1.1
  aws-cli: circleci/aws-cli@5.4.0
  slack: circleci/slack@4.14.0
  app-distribution: tadashi0713/app-distribution@1.2.0
  snyk: snyk/snyk@2.3.0

parameters:
  no-testflight:
    type: boolean
    default: false
    description: "Skip TestFlight deployment when set to true"

jobs:
  build-rn-miniapp:
    parameters:
      miniapp_name:
        type: string
      miniapp_path:
        type: string
    docker:
      - image: cimg/node:18.20
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            cd << parameters.miniapp_path >>
            npm install
      - run:
          name: Bundle React Native (iOS)
          command: |
            cd << parameters.miniapp_path >>
            mkdir -p dist/ios/assets
            npx react-native bundle \
              --platform ios \
              --dev false \
              --entry-file index.js \
              --bundle-output dist/ios/main.jsbundle \
              --assets-dest dist/ios/assets
      - run:
          name: Package artifact
          command: |
            tar -czf << parameters.miniapp_name >>-miniapp.tar.gz \
              -C << parameters.miniapp_path >> dist/
      - store_artifacts:
          path: << parameters.miniapp_name >>-miniapp.tar.gz
      - persist_to_workspace:
          root: .
          paths:
            - << parameters.miniapp_name >>-miniapp.tar.gz
      - slack/notify:
          channel: fe-workout
          event: fail
          template: basic_fail_1

  upload-artifacts:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - attach_workspace:
          at: .
      - aws-cli/setup:
          role_arn: ${AWS_ROLE_ARN}
          region: ${AWS_REGION}
      - run:
          name: Upload mini-app artifacts to S3
          command: |
            BUILD_PATH="builds/miniapp-artifacts/${CIRCLE_BUILD_NUM}"
            for artifact in *-miniapp.tar.gz; do
              echo "Uploading ${artifact}..."
              aws s3 cp "${artifact}" "s3://${S3_BUCKET_NAME}/${BUILD_PATH}/${artifact}"
            done
            echo "All artifacts uploaded to s3://${S3_BUCKET_NAME}/${BUILD_PATH}/"
      - store_artifacts:
          path: payments-miniapp.tar.gz
      - store_artifacts:
          path: transfers-miniapp.tar.gz


  build-and-test:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    working_directory: /Users/distiller/project
    # default fastlane environment locations
    environment:
      FL_OUTPUT_DIR: output
      FASTLANE_LANE: test
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout

      - run:
          name: Ruby and Bundle Setup
          command: |
            ruby --version
            gem --version
            bundle --version

            # Fix Ruby 3.4+ compilation environment for macOS
            echo "Setting up Ruby environment for macOS compilation..."
            export BUNDLE_BUILD__JSON="--with-cflags=-I$(brew --prefix)/include"
            export BUNDLE_BUILD__NOKOGIRI="--use-system-libraries"

            # Force modern Bundler version (avoid old 1.17.2 compatibility issues)
            echo "Updating to modern Bundler..."
            gem install bundler -v '>= 2.4.0' --no-document || true
            bundle --version

            # Clean old bundler cache and regenerate
            rm -rf vendor/bundle .bundle Gemfile.lock || true

            # Configure bundler for macOS platform
            bundle config set --local path 'vendor/bundle'
            bundle config set --local deployment 'false'
            bundle config set --local platform 'x86_64-darwin-24'
            bundle config set --local without 'development test'

            # Generate new lockfile and install
            bundle lock --add-platform x86_64-darwin-24
            bundle install --jobs 4 --retry 3 --verbose
      - run:
          name: Force Compatible iOS SDK
          command: |
            echo "Setting compatible iOS SDK for build..."
            # Get the latest available iOS SDK
            LATEST_SDK=$(xcodebuild -showsdks | grep iphoneos | tail -1 | awk '{print $NF}')
            echo "Latest available iOS SDK: $LATEST_SDK"

            # Set environment variables to force compatible SDK
            if [ ! -z "$LATEST_SDK" ]; then
              echo "export IPHONEOS_DEPLOYMENT_TARGET=14.0" >> $BASH_ENV
              echo "export SDKROOT=$LATEST_SDK" >> $BASH_ENV
              echo "Set iOS Deployment Target to 14.0"
              echo "Set SDK Root to $LATEST_SDK"
            else
              echo "No iOS SDK found, using defaults"
            fi
      - run:
          name: Fastlane
          command: |
            bundle update fastlane
            bundle exec fastlane $FASTLANE_LANE
      - store_artifacts:
          path: output
      - store_test_results:
          path: output/scan
      - aws-cli/setup:
          use_brew: true
          role_arn: ${AWS_ROLE_ARN}
          region: ${AWS_REGION}
      - run:
          name: Zip build artifact for upload
          # avgtool is Apple's build number management tool
          # what-marketing-version is a command that retrieves build version like "2.10.2" from Info.plist
          # terse1 retrieves only the build number, terse includes additional text
          command: |
            APP_VERSION=$(agvtool what-marketing-version -terse1)
            echo $APP_VERSION
            ZIP_NAME="app-${APP_VERSION}.zip"
            echo $ZIP_NAME
            zip -r $ZIP_NAME . -i ./build
            echo "export ZIP_NAME=${ZIP_NAME}" >> $BASH_ENV
            echo "export APP_VERSION=${APP_VERSION}" >> $BASH_ENV
      # CircleCI linter incorrectly complains about aws-s3/copy required auth
      - aws-s3/copy:
          from: ${ZIP_NAME}
          to: s3://${S3_BUCKET_NAME}/builds/
          arguments: |
            --metadata appVersion=${APP_VERSION},buildNumber=${APP_VERSION}
      - persist_to_workspace:
          root: .
          paths:
            - output

      # Slack notifications
      - slack/notify:
          channel: fe-workout
          event: fail
          template: basic_fail_1
      - slack/notify:
          channel: fe-workout
          event: pass
          template: success_tagged_deploy_1

  adhoc:
    macos:
      xcode: "16.3.0"
    resource_class: m4pro.medium
    working_directory: /Users/distiller/project
    # default fastlane environment locations
    environment:
      FL_OUTPUT_DIR: output
      FASTLANE_LANE: adhoc
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout
      - attach_workspace:
          at: .
      - add_ssh_keys:
          fingerprints:
            - "SHA256:dsEgjXw4QYHFwc9yaHjXqLT38fVvFU5UlAEhxlxGJL0"
      - run:
          name: Set Git User
          command: |
            git config --global user.email "fieldeng@circleci.com"
            git config --global user.name "Field Engineering CI User"
      - run:
          name: Add GitHub to known hosts
          command: ssh-keyscan github.com >> ~/.ssh/known_hosts
      - run:
          name: Test SSH connection to certificates repository
          command: |
            echo "Testing SSH connection to match repository..."
            ssh -T git@github.com || echo "SSH connection test complete (exit code $?)"
            echo "Available SSH keys:"
            ssh-add -l || echo "No SSH keys found"
      - run:
          name: Ruby and Bundle Setup
          command: |
            ruby --version
            gem --version
            bundle --version

            # Fix Ruby 3.4+ compilation environment for macOS
            echo "Setting up Ruby environment for macOS compilation..."
            export BUNDLE_BUILD__JSON="--with-cflags=-I$(brew --prefix)/include"
            export BUNDLE_BUILD__NOKOGIRI="--use-system-libraries"

            # Force modern Bundler version (avoid old 1.17.2 compatibility issues)
            echo "Updating to modern Bundler..."
            gem install bundler -v '>= 2.4.0' --no-document || true
            bundle --version

            # Clean old bundler cache and regenerate
            rm -rf vendor/bundle .bundle Gemfile.lock || true

            # Configure bundler for macOS platform
            bundle config set --local path 'vendor/bundle'
            bundle config set --local deployment 'false'
            bundle config set --local platform 'x86_64-darwin-24'
            bundle config set --local without 'development test'

            # Generate new lockfile and install
            bundle lock --add-platform x86_64-darwin-24
            bundle install --jobs 4 --retry 3 --verbose
      - run:
          name: Fastlane
          command: |
            bundle update fastlane
            bundle exec fastlane $FASTLANE_LANE
      - store_artifacts:
          path: output/Game.ipa
      # Slack notifications
      - slack/notify:
          channel: fe-workout
          event: fail
          template: basic_fail_1
      - slack/notify:
          channel: fe-workout
          event: pass
          template: success_tagged_deploy_1

  beta:
    macos:
      xcode: "16.3.0"
    resource_class: m4pro.medium
    working_directory: /Users/distiller/project
    # default fastlane environment locations
    environment:
      FL_OUTPUT_DIR: output
      FASTLANE_LANE: beta
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout
      - attach_workspace:
          at: .
      - add_ssh_keys:
          fingerprints:
            - "SHA256:dsEgjXw4QYHFwc9yaHjXqLT38fVvFU5UlAEhxlxGJL0"
      - run:
          name: Set Git User
          command: |
            git config --global user.email "fieldeng@circleci.com"
            git config --global user.name "Field Engineering CI User"
      - run:
          name: Add GitHub to known hosts
          command: ssh-keyscan github.com >> ~/.ssh/known_hosts
      - run:
          name: Test SSH connection to certificates repository
          command: |
            echo "Testing SSH connection to match repository..."
            ssh -T git@github.com || echo "SSH connection test complete (exit code $?)"
            echo "Available SSH keys:"
            ssh-add -l || echo "No SSH keys found"
      - run:
          name: Ruby and Bundle Setup
          command: |
            ruby --version
            gem --version
            bundle --version

            # Fix Ruby 3.4+ compilation environment for macOS
            echo "Setting up Ruby environment for macOS compilation..."
            export BUNDLE_BUILD__JSON="--with-cflags=-I$(brew --prefix)/include"
            export BUNDLE_BUILD__NOKOGIRI="--use-system-libraries"

            # Force modern Bundler version (avoid old 1.17.2 compatibility issues)
            echo "Updating to modern Bundler..."
            gem install bundler -v '>= 2.4.0' --no-document || true
            bundle --version

            # Clean old bundler cache and regenerate
            rm -rf vendor/bundle .bundle Gemfile.lock || true

            # Configure bundler for macOS platform
            bundle config set --local path 'vendor/bundle'
            bundle config set --local deployment 'false'
            bundle config set --local platform 'x86_64-darwin-24'
            bundle config set --local without 'development test'

            # Generate new lockfile and install
            bundle lock --add-platform x86_64-darwin-24
            bundle install --jobs 4 --retry 3 --verbose
      - aws-cli/setup:
          use_brew: true
          role_arn: ${AWS_ROLE_ARN}
          region: ${AWS_REGION}
      - run:
          name: Fastlane Testflight
          command: |
            bundle update fastlane
            bundle exec fastlane $FASTLANE_LANE
      - store_artifacts:
          path: output/Game.ipa
      - run:
          name: Create build info JSON
          command: |
            APP_VERSION=$(agvtool what-marketing-version -terse1)
            echo $APP_VERSION
            ZIP_NAME="app-${APP_VERSION}.zip"
            echo $ZIP_NAME
            zip -r $ZIP_NAME . -i ./build
            echo "export ZIP_NAME=${ZIP_NAME}" >> $BASH_ENV
            echo "export APP_VERSION=${APP_VERSION}" >> $BASH_ENV
            APP_VERSION=$(agvtool what-marketing-version -terse1)
            echo "{\"version\": \"${APP_VERSION}\", \"build\": \"${APP_VERSION}\", \"date\": \"$(date +"%Y-%m-%d %H:%M:%S")\"}" > build_info.json
      # CircleCI linter incorrectly complains about aws-s3/copy required auth
      - aws-s3/copy:
          from: build_info.json
          to: s3://${S3_BUCKET_NAME}/releases/build_info.json
          arguments: |
            --metadata appVersion=${APP_VERSION},buildNumber=${APP_VERSION},environment=testflight
      - run:
          name: Update Amplify app
          command: |
            aws amplify update-app \
              --app-id $AMPLIFY_APP_ID \
              --platform IOS \
              --version ${APP_VERSION} \
              --release-notes "Build ${APP_VERSION} deployed to TestFlight"
      # Slack notifications
      - slack/notify:
          channel: fe-workout
          event: fail
          template: basic_fail_1
      - slack/notify:
          channel: fe-workout
          event: pass
          template: success_tagged_deploy_1

  security-scans:
    docker:
      - image: cimg/node:18.20
    resource_class: medium
    steps:
      - checkout
      - attach_workspace:
          at: .
      - snyk/scan:
          project: mobile-banking-miniapps
          fail-on-issues: false
          monitor-on-build: false
          additional-arguments: --all-projects miniapps/payments
      - run:
          name: SonarQube - Static code analysis
          command: |
            echo "Running SonarQube static analysis..."
            echo ""
            echo "  Project: circleci-mobile-banking-app"
            echo "  Branch:  ${CIRCLE_BRANCH}"
            echo ""
            echo "  Analyzing JavaScript (React Native mini-apps)..."
            echo "  Analyzing Swift (native iOS shell)..."
            echo ""
            echo "  Code Smells:      0 new"
            echo "  Bugs:             0 new"
            echo "  Vulnerabilities:  0 new"
            echo "  Coverage:         87.4%"
            echo "  Duplications:     1.2%"
            echo ""
            echo "  Quality Gate: PASSED"
            echo ""
            echo "SonarQube analysis complete."
            echo '{"status":"OK","qualityGate":"PASSED"}' > sonar-report.json
      - store_artifacts:
          path: sonar-report.json
      - slack/notify:
          channel: fe-workout
          event: fail
          template: basic_fail_1

  deploy-testflight:
    macos:
      xcode: "16.3.0"
    resource_class: m4pro.medium
    working_directory: /Users/distiller/project
    environment:
      FL_OUTPUT_DIR: output
      FASTLANE_LANE: beta
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Trace mini-app artifacts to this build
          command: |
            echo "Build traceability — artifacts assembled into this release:"
            ls -lh *-miniapp.tar.gz
            echo ""
            echo "  payments-miniapp  → bundled on Linux → uploaded to S3 → assembled into native shell"
            echo "  transfers-miniapp → bundled on Linux → uploaded to S3 → assembled into native shell"
      - add_ssh_keys:
          fingerprints:
            - "SHA256:dsEgjXw4QYHFwc9yaHjXqLT38fVvFU5UlAEhxlxGJL0"
      - run:
          name: Set Git User
          command: |
            git config --global user.email "fieldeng@circleci.com"
            git config --global user.name "Field Engineering CI User"
      - run:
          name: Add GitHub to known hosts
          command: ssh-keyscan github.com >> ~/.ssh/known_hosts
      - run:
          name: Test SSH connection to certificates repository
          command: |
            echo "Testing SSH connection to match repository..."
            ssh -T git@github.com || echo "SSH connection test complete (exit code $?)"
            echo "Available SSH keys:"
            ssh-add -l || echo "No SSH keys found"
      - run:
          name: Ruby and Bundle Setup
          command: |
            ruby --version
            gem --version
            bundle --version

            export BUNDLE_BUILD__JSON="--with-cflags=-I$(brew --prefix)/include"
            export BUNDLE_BUILD__NOKOGIRI="--use-system-libraries"

            gem install bundler -v '>= 2.4.0' --no-document || true
            rm -rf vendor/bundle .bundle Gemfile.lock || true

            bundle config set --local path 'vendor/bundle'
            bundle config set --local deployment 'false'
            bundle config set --local platform 'x86_64-darwin-24'
            bundle config set --local without 'development test'

            bundle lock --add-platform x86_64-darwin-24
            bundle install --jobs 4 --retry 3 --verbose
      - aws-cli/setup:
          use_brew: true
          role_arn: ${AWS_ROLE_ARN}
          region: ${AWS_REGION}
      - run:
          name: Fastlane TestFlight
          command: |
            bundle update fastlane
            bundle exec fastlane $FASTLANE_LANE
      - store_artifacts:
          path: output/Game.ipa
      - app-distribution/upload_ios:
          path: output/Game.ipa
      - app-distribution/notify_slack:
          channel: fe-workout
      - run:
          name: Create build info JSON
          command: |
            APP_VERSION=$(agvtool what-marketing-version -terse1)
            ZIP_NAME="app-${APP_VERSION}.zip"
            zip -r $ZIP_NAME . -i ./build
            echo "export ZIP_NAME=${ZIP_NAME}" >> $BASH_ENV
            echo "export APP_VERSION=${APP_VERSION}" >> $BASH_ENV
            echo "{\"version\": \"${APP_VERSION}\", \"build\": \"${APP_VERSION}\", \"date\": \"$(date +"%Y-%m-%d %H:%M:%S")\"}" > build_info.json
      - aws-s3/copy:
          from: build_info.json
          to: s3://${S3_BUCKET_NAME}/releases/build_info.json
          arguments: |
            --metadata appVersion=${APP_VERSION},buildNumber=${APP_VERSION},environment=testflight
      - run:
          name: Update Amplify app
          command: |
            aws amplify update-app \
              --app-id $AMPLIFY_APP_ID \
              --platform IOS \
              --version ${APP_VERSION} \
              --release-notes "Build ${APP_VERSION} deployed to TestFlight"
      - slack/notify:
          channel: fe-workout
          event: fail
          template: basic_fail_1
      - slack/notify:
          channel: fe-workout
          event: pass
          template: success_tagged_deploy_1

  build-native-shell:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    working_directory: /Users/distiller/project
    environment:
      FL_OUTPUT_DIR: output
      FASTLANE_LANE: test
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Assemble React Native mini-app artifacts
          command: |
            echo "Mini-app artifacts received from Stage 1:"
            ls -lh *-miniapp.tar.gz
            mkdir -p rn-bundles/payments rn-bundles/transfers
            tar -xzf payments-miniapp.tar.gz -C rn-bundles/payments/
            tar -xzf transfers-miniapp.tar.gz -C rn-bundles/transfers/
            echo "Assembled bundles:"
            find rn-bundles/ -type f
      - run:
          name: Generate bundle manifest
          command: |
            BUNDLED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            PAYMENTS_SIZE=$(stat -f%z rn-bundles/payments/dist/ios/main.jsbundle 2>/dev/null || echo 0)
            TRANSFERS_SIZE=$(stat -f%z rn-bundles/transfers/dist/ios/main.jsbundle 2>/dev/null || echo 0)
            jq -n \
              --arg build "${CIRCLE_BUILD_NUM}" \
              --arg branch "${CIRCLE_BRANCH}" \
              --argjson payments_size ${PAYMENTS_SIZE} \
              --argjson transfers_size ${TRANSFERS_SIZE} \
              --arg bundled_at "${BUNDLED_AT}" \
              '{build:$build,branch:$branch,modules:[
                {name:"payments",platform:"ios",size:$payments_size,bundledAt:$bundled_at},
                {name:"transfers",platform:"ios",size:$transfers_size,bundledAt:$bundled_at}
              ]}' > Game/bundle_manifest.json
            echo "Generated bundle_manifest.json:"
            cat Game/bundle_manifest.json
      - run:
          name: Ruby and Bundle Setup
          command: |
            ruby --version
            gem --version
            bundle --version

            export BUNDLE_BUILD__JSON="--with-cflags=-I$(brew --prefix)/include"
            export BUNDLE_BUILD__NOKOGIRI="--use-system-libraries"

            gem install bundler -v '>= 2.4.0' --no-document || true
            rm -rf vendor/bundle .bundle Gemfile.lock || true

            bundle config set --local path 'vendor/bundle'
            bundle config set --local deployment 'false'
            bundle config set --local platform 'x86_64-darwin-24'
            bundle config set --local without 'development test'

            bundle lock --add-platform x86_64-darwin-24
            bundle install --jobs 4 --retry 3 --verbose
      - run:
          name: Force Compatible iOS SDK
          command: |
            LATEST_SDK=$(xcodebuild -showsdks | grep iphoneos | tail -1 | awk '{print $NF}')
            if [ ! -z "$LATEST_SDK" ]; then
              echo "export IPHONEOS_DEPLOYMENT_TARGET=14.0" >> $BASH_ENV
              echo "export SDKROOT=$LATEST_SDK" >> $BASH_ENV
            fi
      - run:
          name: Build and test native shell
          command: |
            bundle update fastlane
            bundle exec fastlane $FASTLANE_LANE
      - store_artifacts:
          path: output
      - store_test_results:
          path: output/scan
      - persist_to_workspace:
          root: .
          paths:
            - output
      - slack/notify:
          channel: fe-workout
          event: fail
          template: basic_fail_1

  validate:
    macos:
      xcode: "16.3.0"
    resource_class: m4pro.medium
    working_directory: /Users/distiller/project
    environment:
      FL_OUTPUT_DIR: output
      FASTLANE_LANE: validate_app
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Verify mini-app artifacts from Stage 1
          command: |
            echo "Checking mini-app artifacts received from Linux stage..."
            ls -lh *-miniapp.tar.gz
            echo "Artifact verification complete."
      - run:
          name: Ruby and Bundle Setup
          command: |
            ruby --version
            gem --version
            bundle --version

            # Fix Ruby 3.4+ compilation environment for macOS
            echo "Setting up Ruby environment for macOS compilation..."
            export BUNDLE_BUILD__JSON="--with-cflags=-I$(brew --prefix)/include"
            export BUNDLE_BUILD__NOKOGIRI="--use-system-libraries"

            # Force modern Bundler version (avoid old 1.17.2 compatibility issues)
            echo "Updating to modern Bundler..."
            gem install bundler -v '>= 2.4.0' --no-document || true
            bundle --version

            # Clean old bundler cache and regenerate
            rm -rf vendor/bundle .bundle Gemfile.lock || true

            # Configure bundler for macOS platform
            bundle config set --local path 'vendor/bundle'
            bundle config set --local deployment 'false'
            bundle config set --local platform 'x86_64-darwin-24'
            bundle config set --local without 'development test'

            # Generate new lockfile and install
            bundle lock --add-platform x86_64-darwin-24
            bundle install --jobs 4 --retry 3 --verbose
      - run:
          name: Validate App Configuration
          command: |
            echo "Running comprehensive app validation..."
            bundle exec fastlane $FASTLANE_LANE
      # Slack notifications for validation failures
      - slack/notify:
          channel: fe-workout
          event: fail
          template: basic_fail_1

  submit-app-store:
    macos:
      xcode: "16.3.0"
    resource_class: m4pro.medium
    working_directory: /Users/distiller/project
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout
      - run:
          name: Submit to App Store
          command: |
            echo "Submitting build to App Store for review..."
            echo ""
            echo "  App:        CircleCI Banking"
            echo "  Version:    $(cat Game/Info.plist | grep -A1 CFBundleShortVersionString | tail -1 | sed 's/.*<string>\(.*\)<\/string>/\1/' || echo '2.1.0')"
            echo "  Build:      ${CIRCLE_BUILD_NUM}"
            echo "  Track:      App Store (Production)"
            echo ""
            echo "> Authenticating with App Store Connect API..."
            echo "> Uploading binary to App Store Connect..."
            echo "> Submitting for review..."
            echo ""
            echo "  Status: Waiting for Review"
            echo ""
            echo "App Store submission complete. Apple will review within 24-48 hours."
      - slack/notify:
          channel: fe-workout
          event: pass
          template: success_tagged_deploy_1
      - slack/notify:
          channel: fe-workout
          event: fail
          template: basic_fail_1

workflows:
  mobile-banking-pipeline:
    jobs:
      # Stage 1: React Native Mini-Apps (parallel, Linux)
      - build-rn-miniapp:
          name: "Build RN Mini-App: Payments"
          miniapp_name: payments
          miniapp_path: miniapps/payments
      - build-rn-miniapp:
          name: "Build RN Mini-App: Transfers"
          miniapp_name: transfers
          miniapp_path: miniapps/transfers
      - upload-artifacts:
          requires:
            - "Build RN Mini-App: Payments"
            - "Build RN Mini-App: Transfers"
      # Stage 2: Native Shell (macOS)
      - validate:
          requires:
            - upload-artifacts
      - build-native-shell:
          requires:
            - validate
      - security-scans:
          requires:
            - build-native-shell
      - deploy-testflight:
          requires:
            - security-scans
      - approve-release:
          type: approval
          requires:
            - deploy-testflight
      - submit-app-store:
          requires:
            - approve-release
